    <script>
      ;(() => {
        try {
          window.localStorage.setItem("pwlo-theme", "dark")
          document.documentElement.dataset.theme = "dark"
        } catch {
          document.documentElement.dataset.theme = "dark"
        }
      })()
    </script>
    <script>
      ;(() => {
        try {
          if (window.sessionStorage.getItem("pwlo-trigger-boot") === "true") {
            document.documentElement.classList.add("locale-boot-pending")
          }
        } catch {
          // Ignore storage access errors.
        }
      })()
    </script>
    <script>
      ;(() => {
        const path = window.location.pathname
        if (path !== "/" && path !== "") return

        try {
          const cookieMatch = document.cookie.match(/(?:^|; )pwlo-locale=([^;]+)/)
          const savedLocale = cookieMatch
            ? decodeURIComponent(cookieMatch[1])
            : window.localStorage.getItem("pwlo-locale")

          if (savedLocale === "pl") window.location.replace("/pl/")
          else if (savedLocale === "de") window.location.replace("/de/")
        } catch {
          // Ignore storage access errors and continue with the default locale.
        }
      })()
    </script>
    <script type="module">

          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
